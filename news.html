<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="description"
      content="葉鹿下町自治会のお知らせ、行事、防災、生活情報を掲載するページ。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">本文へ移動</a>

    <header class="site-header">
      <nav class="nav-shell" aria-label="メインメニュー">
        <a class="brand" href="index.html" aria-label="葉鹿下町自治会 ホーム">
          <span class="brand-mark" aria-hidden="true">葉</span>
          <span>
            <strong>葉鹿下町自治会</strong>
            <small>栃木県足利市</small>
          </span>
        </a>
        <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-menu">
          <span class="icon-lines" aria-hidden="true"></span>
          <span>メニュー</span>
        </button>
        <ul id="site-menu" class="site-menu">
          <li><a href="circular.html">回覧板</a></li>
          <li><a href="disaster.html">防災</a></li>
          <li><a href="garbage.html">ごみ収集</a></li>
        </ul>
      </nav>
    </header>

    <main id="main">
      <section class="page-hero">
        <a class="back-link" href="index.html">ホームへ戻る</a>
        <p class="eyebrow">News</p>
        <h1><span>お知らせ</span></h1>
        <p class="lead">自治会からのお知らせ、行事の変更、防災や生活に関する連絡をまとめます。</p>
      </section>

      <section class="content-band page-content">
        <div class="section-head">
          <div>
            <p class="eyebrow">Latest</p>
            <h2>最新のお知らせ</h2>
          </div>
          <div class="filter-tabs" role="tablist" aria-label="お知らせカテゴリ">
            <button class="filter-tab is-active" type="button" data-filter="all">すべて</button>
            <button class="filter-tab" type="button" data-filter="urgent">重要</button>
            <button class="filter-tab" type="button" data-filter="event">行事</button>
            <button class="filter-tab" type="button" data-filter="life">生活</button>
          </div>
        </div>

        <div class="notice-list" aria-live="polite">
          <article class="notice-item news-card" data-category="urgent">
            <div>
              <time datetime="2026-05-24">2026年5月24日</time>
              <span class="tag urgent">重要</span>
            </div>
              <h3>大雨・台風・地震への備えについて</h3>
              <p>災害情報、避難情報、気象情報は足利市防災ポータルで確認できます。</p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>葉鹿下町自治会＆育成会 住民ポータル</p>
    </footer>

    <script src="app.js"></script>
